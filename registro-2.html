<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <form action="/cadastrar"method="post">
            <label for="nome">Nome completo</label>
            <input name="nome" id="nome" type="text" placeholder="Usuário"/>

            <label for="telefone">Telefone</label>
            <input name="telefone" id="telefone" type="text" placeholder="(00)0000-0000"/>
            
            <label for="email">E-mail</label>
            <input name="email" id="email" type="text" placeholder="user@email.com"/>

            <label for="senha">Senha</label>
            <input name="senha" id="senha" type="text" placeholder="**********"/>
        </form>
    </div>
</body>
</html>
